name: Deploy to Vultr

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Vultr Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: root
          password: ${{ secrets.VULTR_PASSWORD }}
          port: 22
          script: |
            set -e
            echo "🚀 XPLAY 자동 배포 시작..."
            
            cd /opt/xplay/app
            
            # GitHub에서 최신 코드 pull
            echo "📥 최신 코드 pull..."
            git fetch origin main
            git reset --hard origin/main
            
            # 의존성 설치
            echo "📦 의존성 설치..."
            if command -v pnpm &> /dev/null; then
              pnpm install --frozen-lockfile 2>/dev/null || pnpm install
            else
              npm install -g pnpm
              pnpm install
            fi
            
            # 프로덕션 빌드
            echo "🔨 프로덕션 빌드..."
            cp /opt/xplay/.env.production .env.production 2>/dev/null || true
            pnpm build
            
            # Docker 컨테이너 재시작
            echo "🐳 Docker 컨테이너 재빌드 및 재시작..."
            cd /opt/xplay
            docker compose build --no-cache xplay-web
            docker compose up -d xplay-web
            
            # 텔레그램 봇도 재시작
            docker compose restart xplay-telegram-bot 2>/dev/null || true
            
            echo "✅ 배포 완료!"
            docker compose ps
