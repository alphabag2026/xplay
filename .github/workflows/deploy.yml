name: Deploy to Vultr

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Vultr Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: root
          password: ${{ secrets.VULTR_PASSWORD }}
          port: 22
          command_timeout: 10m
          script: |
            set -e
            echo "🚀 XPLAY 자동 배포 시작..."
            
            cd /opt/xplay/app
            
            # GitHub에서 최신 코드 pull
            echo "📥 최신 코드 pull..."
            git fetch origin main
            git reset --hard origin/main
            
            # .env.production 복사
            cp /opt/xplay/.env.production .env.production 2>/dev/null || true
            
            # 의존성 설치
            echo "📦 의존성 설치..."
            pnpm install --frozen-lockfile 2>/dev/null || pnpm install
            
            # DB 마이그레이션 (스키마 변경 적용)
            echo "🗄️ DB 스키마 마이그레이션..."
            pnpm db:push 2>/dev/null || true
            
            # 프로덕션 빌드
            echo "🔨 프로덕션 빌드..."
            pnpm build
            
            # Docker 컨테이너 재빌드 및 재시작
            echo "🐳 Docker 컨테이너 재빌드..."
            docker compose build xplay-web
            docker compose up -d xplay-web
            
            # 텔레그램 봇도 재시작
            docker compose restart xplay-telegram-bot 2>/dev/null || true
            
            # 관리자 비밀번호 설정 (passwordHash가 null인 경우)
            echo "🔑 관리자 비밀번호 확인..."
            docker compose exec -T xplay-web node scripts/ensure-admin-pw.mjs || true
            
            # 데이터 마이그레이션 (FAQ, 자료실, 튜토리얼 등 콘텐츠 동기화)
            echo "📋 콘텐츠 데이터 마이그레이션..."
            docker compose exec -T xplay-web node scripts/apply-migration-to-vultr.mjs || true
            
            # 상태 확인
            sleep 10
            docker compose ps
            
            echo "✅ 배포 완료!"
